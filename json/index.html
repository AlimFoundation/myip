<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Геолокация: страна и город</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #e7f3ff;
            border-left: 4px solid #007acc;
            font-size: 1.2em;
        }
        .loading { color: #6c757d; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background: #005a9e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Определение геолокации</h1>
        <p>Нажмите кнопку ниже, чтобы разрешить браузеру определить ваше местоположение.</p>
        <button onclick="getLocation()">Определить местоположение</button>
        <div id="result" class="loading">Нажмите кнопку для запуска...</div>
    </div>

    <script>
        function getLocation() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Ожидание разрешения доступа к геолокации...</p>';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    successCallback,
                    errorCallback,
                    {
                        enableHighAccuracy: true, // Повышенная точность
                        timeout: 10000, // Таймаут 10 с
                        maximumAge: 0 // Не использовать закэшированные данные
                    }
                );
            } else {
                resultDiv.innerHTML = '<p class="error">Геолокация не поддерживается вашим браузером.</p>';
            }
        }

        async function successCallback(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy; // Точность в метрах

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = <p>Координаты получены: ${lat.toFixed(6)}, ${lng.toFixed(6)} (точность: ${Math.round(accuracy)} м)</p>
                                 <p>Обрабатываем данные...</p>;

            try {
                // Используем бесплатный геокодер OpenStreetMap (Nominatim)
                const response = await fetch(
                    https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1
                );
                const data = await response.json();

                let country = data.address?.country || 'Не определена';
                let city = data.address?.city ||
                           data.address?.town ||
                           data.address?.village ||
                           'Не определён';

                resultDiv.innerHTML = 
                    <h2>Ваше местоположение:</h2>
                    <p><strong>Страна:</strong> ${country}</p>
                    <p><strong>Город:</strong> ${city}</p>
                    <p><strong>Координаты:</strong> ${lat.toFixed(6)}, ${lng.toFixed(6)}</p>
                    <p><strong>Точность:</strong> ${Math.round(accuracy)} м</p>
                ;
            } catch (error) {
                resultDiv.innerHTML = <p class="error">Ошибка при определении адреса: ${error.message}</p>;
            }
        }
      function errorCallback(error) {
            const resultDiv = document.getElementById('result');

            switch (error.code) {
                case error.PERMISSION_DENIED:
                    resultDiv.innerHTML = '<p class="error">Доступ к геолокации отклонён. Разрешите доступ в настройках браузера.</p>';
                    break;
                case error.POSITION_UNAVAILABLE:
                    resultDiv.innerHTML = '<p class="error">Данные о местоположении недоступны.</p>';
                    break;
                case error.TIMEOUT:
                    resultDiv.innerHTML = '<p class="error">Превышено время ожидания ответа от службы геолокации.</p>';
                    break;
                default:
                    resultDiv.innerHTML = '<p class="error">Неизвестная ошибка при определении местоположения.</p>';
            }
        }
    </script>
</body>
</html>
